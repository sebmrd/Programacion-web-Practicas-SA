<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="contenedor">
        <h2>Registro</h2>
        
        <form id="registroForm" novalidate>
            
            <div class="form-group">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" minlength="3" required>
                <span class="error-msg" id="error-nombre"></span>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
                <span class="error-msg" id="error-email"></span>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono (10 dígitos):</label>
                <input type="tel" id="telefono" name="telefono" required>
                <span class="error-msg" id="error-telefono"></span>
            </div>

            <div class="form-group">
                <label for="fecha_nac">Fecha de nacimiento:</label>
                <input type="date" id="fecha_nac" name="fecha_nac" required>
                <span class="error-msg" id="error-fecha_nac"></span>
            </div>

            <div class="form-group">
                <label for="genero">Género:</label>
                <select id="genero" name="genero" required>
                    <option value="">Selecciona una opción</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                    <option value="otro">Otro</option>
                </select>
                <span class="error-msg" id="error-genero"></span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                <small id="indicador-fuerza"></small>
                <span class="error-msg" id="error-password"></span>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
                <span class="error-msg" id="error-confirm_password"></span>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Acepto los términos y condiciones</label>
                <span class="error-msg" id="error-terminos"></span>
            </div>

            <button type="submit" id="btnSubmit" disabled>Registrarse</button>
            
            <div id="mensajeGlobal"></div>
        </form>
    </div>

    <script src="js/validacion.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
